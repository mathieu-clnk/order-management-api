name: Order Management
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: maven:3-amazoncorretto-17

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: Build with Maven
        run: mvn --batch-mode package
